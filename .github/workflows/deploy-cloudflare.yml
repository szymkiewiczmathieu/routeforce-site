name: Deploy gettourvia.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tourvia-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build, verify and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build public artifact
        run: python scripts/build_public.py

      - name: Verify public artifact
        run: python scripts/verify_public.py

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.112.0"
          command: deploy

      - name: Smoke production
        run: python scripts/smoke_production.py
